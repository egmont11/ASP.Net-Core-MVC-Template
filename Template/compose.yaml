services:
  db:
    image: postgres:latest
    container_name: template_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: templatedb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  templateweb:
    image: templateweb
    build:
      context: .
      dockerfile: TemplateWeb/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=templatedb;Username=user;Password=password
    depends_on:
      - db
    ports:
      - "8080:8080"
    profiles:
      - full

volumes:
  postgres_data:

